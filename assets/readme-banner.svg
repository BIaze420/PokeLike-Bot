<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-labelledby="title desc">
  <title id="title">Star and watch PokeLike Bot on GitHub</title>
  <desc id="desc">A PokeLike Bot banner asking users to star and watch the GitHub repository for updates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1324"/>
      <stop offset="0.55" stop-color="#142b46"/>
      <stop offset="1" stop-color="#183a2f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f385d"/>
      <stop offset="1" stop-color="#102033"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff2a6"/>
      <stop offset="0.48" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#f59f17"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#74f2aa"/>
      <stop offset="1" stop-color="#21c16b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020817" flood-opacity="0.42"/>
    </filter>
    <clipPath id="round">
      <rect x="0" y="0" width="1200" height="360" rx="34"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="360" fill="url(#bg)"/>

    <g opacity="0.85">
      <circle cx="175" cy="86" r="2.5" fill="#ffffff"/>
      <circle cx="290" cy="52" r="2" fill="#ffffff"/>
      <circle cx="500" cy="72" r="2.5" fill="#ffffff"/>
      <circle cx="680" cy="46" r="2" fill="#ffffff"/>
      <circle cx="1024" cy="82" r="3" fill="#ffffff"/>
      <circle cx="1110" cy="142" r="2" fill="#ffffff"/>
      <circle cx="86" cy="172" r="2" fill="#ffffff"/>
    </g>

    <g opacity="0.9">
      <rect x="0" y="292" width="1200" height="68" fill="#08101f"/>
      <rect x="24" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="96" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="168" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="240" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="312" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="384" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="456" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="528" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="600" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="672" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="744" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="816" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="888" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="960" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="1032" y="306" width="52" height="24" fill="#13243d"/>
      <rect x="1104" y="306" width="52" height="24" fill="#13243d"/>
    </g>

    <g filter="url(#shadow)" transform="translate(72 70)">
      <rect x="0" y="0" width="160" height="142" rx="28" fill="url(#panel)" stroke="#65d9ff" stroke-width="5"/>
      <line x1="80" y1="0" x2="80" y2="-26" stroke="#65d9ff" stroke-width="6" stroke-linecap="round"/>
      <circle cx="80" cy="-32" r="10" fill="#ffd24a" stroke="#f59f17" stroke-width="4"/>
      <rect x="34" y="45" width="34" height="34" rx="9" fill="#07101e" stroke="#65d9ff" stroke-width="5"/>
      <rect x="92" y="45" width="34" height="34" rx="9" fill="#07101e" stroke="#65d9ff" stroke-width="5"/>
      <circle cx="51" cy="62" r="8" fill="#ffd24a"/>
      <circle cx="109" cy="62" r="8" fill="#ffd24a"/>
      <rect x="48" y="100" width="64" height="12" rx="6" fill="#65d9ff"/>
      <rect x="26" y="142" width="108" height="34" rx="12" fill="url(#green)" stroke="#07101e" stroke-width="5"/>
      <text x="80" y="166" text-anchor="middle" font-family="Verdana,Segoe UI,sans-serif" font-size="23" font-weight="900" fill="#07101e">BOT</text>
    </g>

    <g font-family="Verdana,Segoe UI,Arial,sans-serif">
      <text x="278" y="128" font-size="66" font-weight="900" fill="#06101f" stroke="#06101f" stroke-width="10" stroke-linejoin="round">POKELIKE BOT</text>
      <text x="278" y="128" font-size="66" font-weight="900" fill="#78e7ff">POKELIKE BOT</text>
      <text x="282" y="174" font-size="24" font-weight="800" fill="#c9f5ff" letter-spacing="1.5">FREE WINDOWS AUTOMATION TOOL</text>

      <rect x="282" y="202" width="452" height="44" rx="22" fill="#07101e" stroke="#65d9ff" stroke-width="3"/>
      <text x="508" y="232" text-anchor="middle" font-size="20" font-weight="800" fill="#ffd24a">Full runs - shiny rerolls - item priority</text>
    </g>

    <g transform="translate(760 56)" filter="url(#shadow)">
      <rect x="0" y="0" width="360" height="220" rx="28" fill="#fffdf1" stroke="#07101e" stroke-width="7"/>
      <path d="M68 220 l-32 48 72 -38 z" fill="#fffdf1" stroke="#07101e" stroke-width="7" stroke-linejoin="round"/>

      <g transform="translate(252 24)">
        <path fill="url(#gold)" stroke="#a96800" stroke-width="5" stroke-linejoin="round" d="M52 0 l16 34 37 5 -27 26 7 37 -33 -18 -33 18 7 -37 -27 -26 37 -5 z"/>
        <path fill="#ffffff" opacity="0.55" d="M52 13 l8 18 -8 6 -8 -6 z"/>
      </g>

      <text x="34" y="66" font-family="Verdana,Segoe UI,Arial,sans-serif" font-size="30" font-weight="900" fill="#102033">Enjoying the bot?</text>
      <text x="34" y="106" font-family="Verdana,Segoe UI,Arial,sans-serif" font-size="24" font-weight="800" fill="#1d5c43">Star the repo</text>
      <text x="34" y="140" font-family="Verdana,Segoe UI,Arial,sans-serif" font-size="24" font-weight="800" fill="#1d5c43">and watch for updates.</text>
      <text x="34" y="184" font-family="Verdana,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#4a5568">It helps the project grow.</text>
    </g>

    <g fill="none" stroke="#ffd24a" stroke-width="9" stroke-linecap="round">
      <path d="M650 118 C 748 44, 838 36, 1016 40"/>
    </g>
    <path d="M994 18 L1042 36 L1005 70 Z" fill="#ffd24a"/>
  </g>

  <rect x="2" y="2" width="1196" height="356" rx="34" fill="none" stroke="#65d9ff" stroke-width="4" opacity="0.78"/>
</svg>
